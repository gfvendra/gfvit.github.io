<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gfvIT</title>

    <meta name="description" content="gfvIT — Transformando desafios de TI em soluções. Projetos, artigos e contato de Gustavo Vendramini.">
    <meta name="author" content="Gustavo Vendramini">

    <meta property="og:title" content="gfvIT">
    <meta property="og:description" content="Transformando desafios de TI em soluções.">
    <meta property="og:image" content="https://raw.githubusercontent.com/gfvendra/gfvendra/main/.github/workflows/LOGO-gfvit.png">
    <meta property="og:url" content="https://gfvit.com.br">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="gfvIT">
    <meta name="twitter:description" content="Transformando desafios de TI em soluções.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/gfvendra/gfvendra/main/.github/workflows/LOGO-gfvit.png">

    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/gfvendra/gfvendra/main/.github/workflows/LOGO-gfvit.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0e14;
            background-image: radial-gradient(ellipse 80% 40% at 50% 0%, #1a2040 0%, #0c0e14 70%);
            color: #e8eaed;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 48px 24px;
            box-sizing: border-box;
            text-align: center;
        }

        .container > * {
            opacity: 0;
            animation: fadeUp 0.45s ease forwards;
        }

        .avatar              { animation-delay: 0.05s; }
        .title               { animation-delay: 0.12s; }
        .bio                 { animation-delay: 0.18s; }
        .link-button:nth-of-type(1) { animation-delay: 0.26s; }
        .link-button:nth-of-type(2) { animation-delay: 0.32s; }
        .link-button:nth-of-type(3) { animation-delay: 0.38s; }
        .link-button:nth-of-type(4) { animation-delay: 0.44s; }

        .avatar {
            width: 88px;
            height: 88px;
            object-fit: contain;
            display: block;
            margin: 0 auto 18px;
            border-radius: 14px;
        }

        .title {
            font-size: 1.55em;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .bio {
            font-size: 0.93em;
            font-weight: 400;
            color: #5c6a88;
            margin-bottom: 36px;
        }

        .link-button {
            display: block;
            background: rgba(82, 113, 255, 0.06);
            color: #c8d0e8;
            padding: 15px 20px;
            margin: 11px 0;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.97em;
            font-weight: 600;
            border: 1px solid rgba(82, 113, 255, 0.25);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, color 0.2s ease;
        }

        .link-button:hover {
            background: rgba(82, 113, 255, 0.14);
            border-color: rgba(82, 113, 255, 0.75);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(82, 113, 255, 0.12);
        }

        .link-button.primary {
            background: #5271ff;
            color: #ffffff;
            border-color: #5271ff;
        }

        .link-button.primary:hover {
            background: #6b85ff;
            border-color: #6b85ff;
            box-shadow: 0 8px 32px rgba(82, 113, 255, 0.45);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">

        <img src="https://raw.githubusercontent.com/gfvendra/gfvendra/main/.github/workflows/LOGO-gfvit.png" alt="Logo gfvIT" class="avatar">

        <div class="title">gfvIT</div>
        <div class="bio">Transformando desafios de TI em soluções</div>

        <a href="projetos.html" class="link-button primary">
            Meus Projetos
        </a>

        <a href="https://www.instagram.com/gfv_it" target="_blank" class="link-button">
            Instagram
        </a>

        <a href="mailto:contato@gfvit.com.br" class="link-button">
            Contato por E-mail
        </a>

        <a href="https://www.linkedin.com/in/gustavofvendramini/" target="_blank" class="link-button">
            LinkedIn
        </a>

    </div>
</body>
</html>
