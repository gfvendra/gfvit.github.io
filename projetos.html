<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos — gfvIT</title>

    <meta name="description" content="Projetos de TI de Gustavo Vendramini — gfvIT.">
    <meta name="author" content="Gustavo Vendramini">

    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/gfvendra/gfvendra/main/.github/workflows/LOGO-gfvit.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0e14;
            background-image: radial-gradient(ellipse 80% 40% at 50% 0%, #1a2040 0%, #0c0e14 70%);
            color: #e8eaed;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 24px 64px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeUp 0.45s ease forwards 0.05s;
        }

        .header img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }

        .header-text {
            flex: 1;
        }

        .header-text h1 {
            font-size: 1.3em;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
            letter-spacing: -0.4px;
        }

        .header-text span {
            font-size: 0.82em;
            color: #5c6a88;
        }

        .back-link {
            font-size: 0.85em;
            font-weight: 600;
            color: #5271ff;
            text-decoration: none;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .back-link:hover {
            color: #6b85ff;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 580px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Card */
        .card {
            display: block;
            background: rgba(82, 113, 255, 0.05);
            border: 1px solid rgba(82, 113, 255, 0.2);
            border-radius: 14px;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.45s ease forwards;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
            text-decoration: none;
            cursor: pointer;
        }

        .card:hover {
            border-color: rgba(82, 113, 255, 0.6);
            box-shadow: 0 8px 32px rgba(82, 113, 255, 0.1);
            transform: translateY(-3px);
        }

        .card:nth-child(1) { animation-delay: 0.18s; }
        .card:nth-child(2) { animation-delay: 0.26s; }
        .card:nth-child(3) { animation-delay: 0.34s; }
        .card:nth-child(4) { animation-delay: 0.42s; }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 1px solid rgba(82, 113, 255, 0.15);
        }

        .card-body {
            padding: 18px 20px 20px;
        }

        .card-title {
            font-size: 1em;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 8px;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.85em;
            color: #8a97b5;
            line-height: 1.6;
            margin: 0 0 14px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            font-size: 0.72em;
            font-weight: 600;
            color: #5271ff;
            background: rgba(82, 113, 255, 0.12);
            border: 1px solid rgba(82, 113, 255, 0.3);
            border-radius: 6px;
            padding: 3px 9px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">

        <header class="header">
            <img src="https://raw.githubusercontent.com/gfvendra/gfvendra/main/.github/workflows/LOGO-gfvit.png" alt="Logo gfvIT">
            <div class="header-text">
                <h1>Projetos</h1>
                <span>gfvIT</span>
            </div>
            <a href="index.html" class="back-link">← Voltar</a>
        </header>

        <div class="grid">

            <a href="projeto-01.html" class="card">
                <img src="img/img01.png" alt="Automação de Alertas de Segurança com IA" class="card-image">
                <div class="card-body">
                    <h2 class="card-title">Automação de Alertas de Segurança com IA — Do Firewall ao Telegram</h2>
                    <p class="card-desc">FortiGate detecta tráfego suspeito, n8n orquestra a análise, IA classifica a ameaça e você recebe tudo no Telegram em segundos.</p>
                    <div class="tags">
                        <span class="tag">n8n</span>
                        <span class="tag">FortiGate</span>
                        <span class="tag">AbuseIPDB</span>
                        <span class="tag">AI Agent</span>
                        <span class="tag">Telegram</span>
                    </div>
                </div>
            </a>

        </div>

    </div>
</body>
</html>
